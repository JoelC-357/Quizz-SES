                            { text: "Elle supprime l'ensemble des taxes nationales qui pèsent sur l'achat de carburants fossiles.", isCorrect: false, rationale: "Inversion complète : l'Union européenne encourage plutôt le verdissement de la fiscalité pour réduire la pollution de l'air." }
                        ]
                    },
                    {
                        question: "Qu'est-ce qu'une 'externalité négative' en économie de l'environnement ?",
                        options: [
                            { text: "Un dommage causé par l'activité d'un agent économique à un tiers sans qu'il y ait de compensation financière.", isCorrect: true, rationale: "La pollution ou les rejets de CO2 d'une usine sont des externalités négatives typiques : elles infligent un coût à la société sans que le pollueur ne le paye spontanément." },
                            { text: "La baisse du chiffre d'affaires d'une entreprise provoquée par l'arrivée d'un nouveau concurrent sur le marché.", isCorrect: false, rationale: "Confusion : cela fait partie des risques normaux du jeu concurrentiel de marché, pas d'une externalité hors-marché." },
                            { text: "Le montant de la taxe que l'État impose aux entreprises installées en dehors des zones urbaines.", isCorrect: false, rationale: "Confusion : la taxe est un instrument politique pour corriger l'externalité (internalisation), elle n'est pas l'externalité elle-même." },
                            { text: "La perte de valeur d'une monnaie nationale constatée sur le marché des changes face au dollar.", isCorrect: false, rationale: "Confusion complète avec un phénomène de macroéconomie monétaire (dépréciation des changes)." }
                        ]
                    }
                ]
            }
        ];
    </script>

    <!-- React App Mounting Script -->
<script type="text/babel">
        const { useState, useEffect } = React;

        // Base de données des Auteurs et Citations pour Dissertation / EC3
        const authorsData = [
            {
                name: "Joseph Schumpeter",
                theme: "Croissance & Progrès technique",
                thesis: "L'innovation est un processus discontinu qui bouscule l'économie par vagues.",
                quote: "L'impulsion fondamentale qui met et maintient en mouvement la machine capitaliste sourd des nouveaux biens de consommation, des nouvelles méthodes de production [...], ce processus de Destruction Créatrice constitue la donnée fondamentale du capitalisme.",
                tip: "Idéal pour introduire ou illustrer l'impact des vagues d'innovations technologiques sur l'obsolescence de certains secteurs industriels (EC3 ou dissertation sur le progrès technique)."
            },
            {
                name: "Robert Solow",
                theme: "Sources de la croissance",
                thesis: "La croissance à long terme dépend fondamentalement du progrès technique, le 'résidu'.",
                quote: "Le progrès technique est un résidu, une mesure de notre ignorance face aux déterminants réels de l'efficacité productive.",
                tip: "Utile pour montrer la transition historique entre la croissance extensive (accumulation des facteurs) et la croissance intensive (gains de productivité via la PGF)."
            },
            {
                name: "David Ricardo",
                theme: "Commerce International",
                thesis: "Tous les pays gagnent au libre-échange en se spécialisant là où ils sont comparativement les meilleurs.",
                quote: "Dans un système d'entière liberté du commerce, chaque pays consacre naturellement son capital et son industrie aux genres d'emplois qui lui sont le plus avantageux.",
                tip: "La citation parfaite pour justifier théoriquement la division internationale du travail (DIT) et l'ouverture des frontières économiques dans une EC1 ou EC3."
            },
            {
                name: "Karl Marx",
                theme: "Structure & Stratification sociale",
                thesis: "Les classes sociales sont définies par la place occupée dans les rapports de production et polarisées par un conflit permanent.",
                quote: "L'histoire de toute société jusqu'à nos jours n'a été que l'histoire de la lutte des classes.",
                tip: "À mobiliser pour illustrer une approche réaliste et conflictuelle des classes (classe en soi vs classe pour soi) et l'existence de clivages socio-économiques durables."
            },
            {
                name: "Max Weber",
                theme: "Structure & Stratification sociale",
                thesis: "La stratification sociale est multidimensionnelle (économique, sociale et politique).",
                quote: "Les classes sociales ne sont pas des communautés en lutte, mais des agrégats d'individus partageant les mêmes chances d'accès aux biens.",
                tip: "Parfait pour faire une transition ou une confrontation théorique (Marx vs Weber) lors d'une dissertation portant sur la pertinence actuelle du concept de classe sociale."
            },
            {
                name: "Pierre Bourdieu",
                theme: "Mobilité sociale & Inégalités",
                thesis: "L'école légitime et reproduit les inégalités initiales de capital culturel via l'habitus.",
                quote: "L'action conjuguée du capital culturel familial et de la complicité de l'institution scolaire assure la reproduction des rapports de domination.",
                tip: "Indispensable pour expliquer le manque de fluidité sociale et le poids des configurations familiales/déterminismes culturels dans la réussite scolaire (EC3)."
            },
            {
                name: "Émile Durkheim",
                theme: "Mutations du travail & Lien social",
                thesis: "La division du travail moderne produit une solidarité organique basée sur la complémentarité.",
                quote: "La division du travail ne produit pas seulement de l'efficacité économique, elle crée un lien moral de solidarité organique entre les fonctions spécialisées.",
                tip: "Utile pour nuancer l'idée que la spécialisation du travail isole les individus, en démontrant qu'elle crée au contraire une forte interdépendance sociale."
            },
            {
                name: "Henri Mendras",
                theme: "Structure sociale",
                thesis: "Les Trente Glorieuses ont provoqué une harmonisation des modes de vie et l'essor d'une vaste classe moyenne.",
                quote: "La constellation centrale (la classe moyenne) absorbe progressivement les anciens clivages de classes pour former une société en forme de toupie.",
                tip: "Le concept central à mobiliser pour argumenter en faveur de la thèse de la 'moyennisation' de la société française (affaiblissement des distances inter-classes)."
            },
            {
                name: "Robert Castel",
                theme: "Mutations du travail & Exclusion",
                thesis: "La précarité de l'emploi fragilise le socle protecteur de la citoyenneté, menant à l'exclusion.",
                quote: "La désaffiliation n'est pas l'absence de liens, mais le produit d'un double processus d'effritement du rapport au travail et d'isolement relationnel.",
                tip: "La référence incontournable pour analyser l'impact du chômage de masse ou de l'emploi précaire sur la cohésion sociale et la qualité d'un emploi."
            }
        ];

        // Algorithme de mélange (Fisher-Yates)
        const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        function App() {
            const [selectedChapter, setSelectedChapter] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedOptionIndex, setSelectedOptionIndex] = useState(null);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [view, setView] = useState('dashboard'); // 'dashboard', 'quiz', 'summary', 'authors'
            
            // Réserve d'erreurs
            const [wrongQuestions, setWrongQuestions] = useState(() => {
                const saved = localStorage.getItem('ses_wrong_questions');
                return saved ? JSON.parse(saved) : [];
            });
            const [isRemediationMode, setIsRemediationMode] = useState(false);

            // Suivi des Records
            const [highScores, setHighScores] = useState(() => {
                const saved = localStorage.getItem('ses_high_scores');
                return saved ? JSON.parse(saved) : {};
            });

            // Chronomètre de 15 minutes
            const [isTimerActive, setIsTimerActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(900);

            // Prise en charge du rendu LaTeX
            useEffect(() => {
                if (window.MathJax && window.MathJax.typeset) {
                    window.MathJax.typeset();
                }
            }, [currentQuestionIndex, view, isSubmitted]);

            // Gestion du compte à rebours
            useEffect(() => {
                let timer;
                if (view === 'quiz' && isTimerActive && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft((prev) => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0 && view === 'quiz') {
                    setView('summary');
                }
                return () => clearInterval(timer);
            }, [view, isTimerActive, timeLeft]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const handleStartQuiz = (chapter) => {
                setIsRemediationMode(false);
                const originalChapter = quizData.find(c => c.id === chapter.id) || chapter;
                const randomQuestions = shuffle(originalChapter.questions);
                const finalShuffledQuestions = randomQuestions.map(q => ({
                    ...q,
                    options: shuffle(q.options)
                }));

                setSelectedChapter({
                    ...originalChapter,
                    questions: finalShuffledQuestions
                });
                resetQuizState();
            };

            const handleStartBacBlanc = () => {
                setIsRemediationMode(false);
                let poolGlobal = [];
                quizData.forEach(chap => {
                    poolGlobal = poolGlobal.concat(chap.questions);
                });

                const pickedQuestions = shuffle(poolGlobal).slice(0, 20);
                const finalQuestions = pickedQuestions.map(q => ({
                    ...q,
                    options: shuffle(q.options)
                }));

                setSelectedChapter({
                    id: "bac_blanc",
                    title: "Marathon Bac Blanc - Épreuve Globale",
                    questions: finalQuestions
                });
                resetQuizState();
            };

            const handleStartRemediation = () => {
                if (wrongQuestions.length === 0) return;
                setIsRemediationMode(true);
                
                setSelectedChapter({
                    id: "remediation",
                    title: "Module de Remédiation Personnalisé",
                    questions: shuffle(wrongQuestions).map(q => ({
                        ...q,
                        options: shuffle(q.options)
                    }))
                });
                resetQuizState();
            };

            const resetQuizState = () => {
                setCurrentQuestionIndex(0);
                setSelectedOptionIndex(null);
                setIsSubmitted(false);
                setScore(0);
                setUserAnswers([]);
                setTimeLeft(900);
                setView('quiz');
            };

            const handleOptionSelect = (index) => {
                if (isSubmitted) return;
                setSelectedOptionIndex(index);
            };

            const handleSubmitAnswer = () => {
                if (selectedOptionIndex === null) return;
                
                const questionObj = selectedChapter.questions[currentQuestionIndex];
                const selectedOption = questionObj.options[selectedOptionIndex];
                const correctOptionIndex = questionObj.options.findIndex(opt => opt.isCorrect);
                const isCorrect = selectedOption.isCorrect;
                
                if (isCorrect) {
                    setScore(prev => prev + 1);
                    if (isRemediationMode) {
                        setWrongQuestions(prev => {
                            const updated = prev.filter(q => q.question !== questionObj.question);
                            localStorage.setItem('ses_wrong_questions', JSON.stringify(updated));
                            if (updated.length === 0) {
                                localStorage.setItem('ses_remediation_baseline', '0');
                            }
                            return updated;
                        });
                    }
                } else {
                    setWrongQuestions(prev => {
                        if (prev.some(q => q.question === questionObj.question)) return prev;
                        const updated = [...prev, questionObj];
                        localStorage.setItem('ses_wrong_questions', JSON.stringify(updated));
                        
                        const baseline = parseInt(localStorage.getItem('ses_remediation_baseline') || '0');
                        if (updated.length > baseline) {
                            localStorage.setItem('ses_remediation_baseline', updated.length.toString());
                        }
                        return updated;
                    });
                }

                setUserAnswers([...userAnswers, {
                    question: questionObj.question,
                    selectedOptionText: selectedOption.text,
                    correctOptionText: questionObj.options[correctOptionIndex].text,
                    isCorrect: isCorrect,
                    rationale: questionObj.options[correctOptionIndex].rationale
                }]);

                setIsSubmitted(true);
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex + 1 < selectedChapter.questions.length) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setSelectedOptionIndex(null);
                    setIsSubmitted(false);
                } else {
                    if (!isRemediationMode) {
                        const currentHighScore = highScores[selectedChapter.id] || 0;
                        if (score > currentHighScore) {
                            const updatedScores = { ...highScores, [selectedChapter.id]: score };
                            localStorage.setItem('ses_high_scores', JSON.stringify(updatedScores));
                            setHighScores(updatedScores);
                        }
                    }
                    setView('summary');
                }
            };

            const errorBaseline = Math.max(wrongQuestions.length, parseInt(localStorage.getItem('ses_remediation_baseline') || '0'));
            const errorsCleared = errorBaseline - wrongQuestions.length;
            const recoveryPercent = errorBaseline > 0 ? Math.round((errorsCleared / errorBaseline) * 100) : 0;

            const bestBacScore = highScores["bac_blanc"];
            let bacMedal = null;
            if (bestBacScore !== undefined) {
                if (bestBacScore === 20) bacMedal = "🥇";
                else if (bestBacScore >= 16) bacMedal = "🥈";
                else if (bestBacScore >= 10) bacMedal = "🥉";
            }

            return (
                <div class="min-h-screen flex flex-col justify-between">
                    {/* BARRE DE NAVIGATION BANDEAU */}
                    <header class="bg-white border-b border-slate-200 py-4 shadow-sm sticky top-0 z-50">
                        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
                            <div class="flex items-center space-x-3 cursor-pointer" onClick={() => setView('dashboard')}>
                                <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-2.5 rounded-xl text-white shadow-md shadow-indigo-100">
                                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                                </div>
                                <div>
                                    {/* MODIFIÉ : AJOUT DE VOTRE NOM DIRECTEMENT ICI */}
                                    <h1 class="font-extrabold text-lg text-slate-900 tracking-tight">SES Terminale - M. Chachero</h1>
                                    <p class="text-xs text-slate-500 font-medium">Révisions du Baccalauréat</p>
                                </div>
                            </div>

                            <div class="flex items-center space-x-3">
                                {/********* BOUTON REMÉDIATION *********/}
                                {(view === 'dashboard' || view === 'authors') && (
                                    <button 
                                        onClick={wrongQuestions.length > 0 ? handleStartRemediation : null}
                                        disabled={wrongQuestions.length === 0}
                                        class={`text-sm font-bold px-3 py-2 rounded-xl flex items-center space-x-1.5 transition border ${
                                            wrongQuestions.length > 0 
                                                ? "text-amber-700 bg-amber-50 hover:bg-amber-100 border-amber-200 shadow-sm shadow-amber-50" 
                                                : "text-slate-400 bg-slate-50 border-slate-200 opacity-60 cursor-not-allowed"
                                        }`}
                                    >
                                        <i class="fa-solid fa-kit-medical"></i>
                                        <span>Remédiation {wrongQuestions.length > 0 ? `(${wrongQuestions.length} | ${recoveryPercent}%)` : ""}</span>
                                    </button>
                                )}

                                {/********* BOUTON CITATIONS & AUTEURS *********/}
                                {view !== 'authors' && (
                                    <button 
                                        onClick={() => setView('authors')}
                                        class="text-sm font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-3 py-2 rounded-xl flex items-center space-x-1.5 transition border border-indigo-100"
                                    >
                                        <i class="fa-solid fa-book-bookmark"></i>
                                        <span class="hidden sm:inline">Citations & Auteurs</span>
                                    </button>
                                )}
                                {view !== 'dashboard' && (
                                    <button onClick={() => setView('dashboard')} class="text-sm font-semibold text-slate-600 hover:text-slate-900 flex items-center space-x-1.5 transition">
                                        <i class="fa-solid fa-arrow-left"></i>
                                        <span>Retour</span>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* ZONE CENTRALE DYNAMIQUE */}
                    <main class="max-w-5xl w-full mx-auto px-4 py-8 flex-grow flex items-center justify-center">
                        
                        {/* VIEW 1 : TABLEAU DE BORD ACCUEIL */}
                        {view === 'dashboard' && (
                            <div class="w-full">
                                <div class="text-center mb-8">
                                    <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">Session Active : Mode Autonome</span>
                                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mt-3 mb-2">Entraînez-vous pour l'Épreuve Écrite</h2>
                                    <p class="text-slate-500 max-w-xl mx-auto text-sm">Configurez l'évaluation puis cliquez sur le bouton d'examen global ou choisissez un chapitre thématique.</p>
                                </div>

                                {/* PANNEAU DE COMMANDE COMBINÉ (CHRONO + MARATHON BAC BLANC ACCOLLÉS) */}
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto mb-10">
                                    <div class="flex items-center space-x-4 bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                                        <div class="bg-slate-100 p-2.5 rounded-xl text-slate-600"><i class="fa-solid fa-stopwatch text-lg"></i></div>
                                        <div class="flex-grow">
                                            <span class="block text-sm font-bold text-slate-800">Mode Examen Chronométré</span>
                                            <span class="block text-xs text-slate-400 font-medium">15 minutes pour finir la session</span>
                                        </div>
                                        <button onClick={() => setIsTimerActive(!isTimerActive)} class={`relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out ${isTimerActive ? 'bg-blue-600' : 'bg-slate-200'}`}>
                                            <span class={`pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out ${isTimerActive ? 'translate-x-5' : 'translate-x-0'}`}></span>
                                        </button>
                                    </div>

                                    <div class="bg-gradient-to-br from-violet-600 to-indigo-700 text-white border border-indigo-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition duration-300 flex items-center justify-between cursor-pointer group" onClick={handleStartBacBlanc}>
                                        <div class="flex items-center space-x-4">
                                            <div class="w-10 h-10 rounded-xl bg-white/20 text-white flex items-center justify-center shadow-md"><i class="fa-solid fa-file-signature text-base"></i></div>
                                            <div>
                                                <h3 class="font-extrabold text-white text-sm leading-tight">Marathon Bac Blanc</h3>
                                                <p class="text-[11px] text-indigo-100 font-medium">20 questions transversales</p>
                                            </div>
                                        </div>
                                        <div class="flex items-center space-x-2">
                                            {bestBacScore !== undefined && (
                                                <span class="text-xs font-extrabold bg-white/20 px-2 py-0.5 rounded-full border border-white/10">
                                                    {bacMedal} {bestBacScore}/20
                                                </span>
                                            )}
                                            <i class="fa-solid fa-play group-hover:translate-x-1 transition text-xs"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* GRILLE DES 9 CHAPITRES */}
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {quizData.map((chap) => {
                                        const bestScore = highScores[chap.id];
                                        let medalElement = null;

                                        if (bestScore !== undefined) {
                                            const successRatio = bestScore / chap.questions.length;
                                            if (successRatio === 1) medalElement = { icon: "fa-trophy text-amber-500 text-lg", bg: "bg-amber-50 border-amber-200 text-amber-800", text: "🥇 Or" };
                                            else if (successRatio >= 0.75) medalElement = { icon: "fa-medal text-slate-400 text-lg", bg: "bg-slate-50 border-slate-200 text-slate-700", text: "🥈 Argent" };
                                            else if (successRatio >= 0.5) medalElement = { icon: "fa-medal text-amber-700 text-lg", bg: "bg-orange-50 border-orange-100 text-orange-800", text: "🥉 Bronze" };
                                        }

                                        return (
                                            <div key={chap.id} class="bg-white border border-slate-150 rounded-2xl p-6 shadow-sm hover:shadow-md transition duration-300 flex flex-col justify-between cursor-pointer group" onClick={() => handleStartQuiz(chap)}>
                                                <div>
                                                    <div class="flex justify-between items-start mb-5">
                                                        <div class={`w-12 h-12 rounded-xl bg-gradient-to-br ${chap.color} text-white flex items-center justify-center shadow-lg shadow-slate-100 group-hover:scale-105 transition`}><i class={`fa-solid ${chap.icon} text-lg`}></i></div>
                                                        {medalElement && (
                                                            <span class={`flex items-center space-x-1.5 border px-2.5 py-1 rounded-full text-xs font-extrabold shadow-sm ${medalElement.bg}`}>
                                                                <i class={`fa-solid ${medalElement.icon}`}></i>
                                                                <span>{bestScore}/{chap.questions.length}</span>
                                                            </span>
                                                        )}
                                                    </div>
                                                    <h3 class="font-bold text-slate-900 text-base leading-tight mb-2 group-hover:text-blue-600 transition">{chap.title}</h3>
                                                    <p class="text-xs text-slate-500 font-medium">{chap.questions.length} Questions dispo</p>
                                                </div>
                                                <div class="mt-6 flex items-center justify-between text-xs font-semibold text-blue-600 pt-4 border-t border-slate-50">
                                                    <span>{bestScore !== undefined ? "S'entraîner à nouveau" : "Démarrer"}</span>
                                                    <i class="fa-solid fa-chevron-right group-hover:translate-x-1 transition"></i>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* VIEW 2 : INDEX DES AUTEURS ET CITATIONS */}
                        {view === 'authors' && (
                            <div class="w-full max-w-4xl animate-fadeIn">
                                <div class="text-center mb-8">
                                    <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">Boîte à outils Pédagogique</span>
                                    <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight mt-3 mb-1">Dictionnaire des Citations de Terminale</h2>
                                    <p class="text-slate-500 text-sm">Les arguments théoriques incontournables pour étayer vos dissertations et EC3.</p>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {authorsData.map((author, index) => (
                                        <div key={index} class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex flex-col justify-between space-y-4">
                                            <div>
                                                <div class="flex justify-between items-start mb-2">
                                                    <h3 class="font-extrabold text-slate-900 text-lg">{author.name}</h3>
                                                    <span class="bg-slate-100 text-slate-600 text-xs font-semibold px-2.5 py-1 rounded-md">{author.theme}</span>
                                                </div>
                                                <p class="text-xs text-indigo-600 font-bold mb-3 uppercase tracking-wider">Thèse : {author.thesis}</p>
                                                <div class="bg-slate-50 border-l-4 border-indigo-500 p-3 rounded-r-xl my-2">
                                                    <p class="text-sm italic font-medium text-slate-700 leading-relaxed">« {author.quote} »</p>
                                                </div>
                                            </div>
                                            <div class="bg-emerald-50/50 border border-emerald-100 rounded-xl p-3 text-xs text-emerald-800 leading-relaxed">
                                                <strong>💡 Comment l'utiliser au Bac :</strong> {author.tip}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div class="text-center mt-8">
                                    <button onClick={() => setView('dashboard')} class="bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-8 rounded-xl transition text-sm shadow-md">Retourner aux entraînements</button>
                                </div>
                            </div>
                        )}

                        {/* VIEW 3 : SESSION DE QUIZ ACTIVE */}
                        {view === 'quiz' && selectedChapter && (
                            <div class="bg-white border border-slate-200 rounded-3xl p-6 md:p-8 shadow-xl shadow-slate-100 max-w-2xl w-full">
                                <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">{selectedChapter.title}</span>
                                    <div class="flex items-center space-x-3">
                                        {isTimerActive && (
                                            <span class={`text-xs font-extrabold px-3 py-1.5 rounded-full flex items-center space-x-1.5 ${timeLeft < 60 ? 'bg-rose-100 text-rose-700 animate-pulse' : 'bg-amber-100 text-amber-700'}`}>
                                                <i class="fa-solid fa-clock"></i>
                                                <span>{formatTime(timeLeft)}</span>
                                            </span>
                                        )}
                                        <span class="bg-slate-100 text-slate-700 text-xs font-bold px-3 py-1.5 rounded-full">Question {currentQuestionIndex + 1} / {selectedChapter.questions.length}</span>
                                    </div>
                                </div>

                                <div class="w-full bg-slate-100 h-1.5 rounded-full mb-6">
                                    <div class="bg-blue-600 h-1.5 rounded-full transition-all duration-300" style={{ width: `${((currentQuestionIndex + 1) / selectedChapter.questions.length) * 100}%` }}></div>
                                </div>

                                <h3 class="text-lg font-bold text-slate-900 mb-6 leading-snug">{selectedChapter.questions[currentQuestionIndex].question}</h3>

                                <div class="space-y-3 mb-6">
                                    {selectedChapter.questions[currentQuestionIndex].options.map((opt, idx) => {
                                        let optionBgClass = "border-slate-200 hover:border-blue-500 hover:bg-slate-50";
                                        let icon = null;

                                        if (selectedOptionIndex === idx) optionBgClass = "border-blue-500 bg-blue-50";

                                        if (isSubmitted) {
                                            if (opt.isCorrect) {
                                                optionBgClass = "border-emerald-500 bg-emerald-50 text-emerald-900";
                                                icon = <i class="fa-solid fa-circle-check text-emerald-600 text-lg"></i>;
                                            } else if (selectedOptionIndex === idx) {
                                                optionBgClass = "border-rose-500 bg-rose-50 text-rose-900";
                                                icon = <i class="fa-solid fa-circle-xmark text-rose-600 text-lg"></i>;
                                            } else {
                                                optionBgClass = "border-slate-200 opacity-60";
                                            }
                                        }

                                        return (
                                            <button key={idx} onClick={() => handleOptionSelect(idx)} disabled={isSubmitted} class={`w-full text-left border rounded-2xl p-4 flex justify-between items-center transition font-medium text-sm leading-relaxed ${optionBgClass}`}>
                                                <span>{opt.text}</span>
                                                {icon}
                                            </button>
                                        );
                                    })}
                                </div>

                                {isSubmitted ? (
                                    <div class="mt-6 pt-6 border-t border-slate-100">
                                        <div class={`p-4 rounded-2xl mb-6 text-sm leading-relaxed ${selectedChapter.questions[currentQuestionIndex].options[selectedOptionIndex].isCorrect ? "bg-emerald-50 text-emerald-800 border border-emerald-100" : "bg-rose-50 text-rose-800 border border-rose-100"}`}>
                                            <p class="font-bold mb-1">{selectedChapter.questions[currentQuestionIndex].options[selectedOptionIndex].isCorrect ? "Correct !" : "Faux"}</p>
                                            <p>{selectedChapter.questions[currentQuestionIndex].options[selectedOptionIndex].rationale}</p>
                                        </div>
                                        <button onClick={handleNextQuestion} class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-6 rounded-2xl transition shadow-md shadow-slate-200">The suivant</button>
                                    </div>
                                ) : (
                                    <button onClick={handleSubmitAnswer} disabled={selectedOptionIndex === null} class={`w-full font-bold py-4 px-6 rounded-2xl transition shadow-md ${selectedOptionIndex !== null ? "bg-blue-600 hover:bg-blue-700 text-white shadow-blue-100" : "bg-slate-100 text-slate-400 cursor-not-allowed shadow-none"}`}>Valider</button>
                                )}
                            </div>
                        )}

                        {/* VIEW 4 : BILAN DE FIN DE QUIZ */}
                        {view === 'summary' && selectedChapter && (
                            <div class="bg-white border border-slate-200 rounded-3xl p-6 md:p-8 shadow-xl shadow-slate-100 max-w-2xl w-full">
                                <div class="text-center mb-8">
                                    <div class={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${timeLeft === 0 ? 'bg-rose-50 text-rose-600' : 'bg-indigo-50 text-indigo-600'}`}><i class={`fa-solid ${timeLeft === 0 ? 'fa-hourglass-end animate-bounce' : 'fa-trophy'} text-2xl`}></i></div>
                                    <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">{timeLeft === 0 ? "Temps Écoulé !" : isRemediationMode ? "Remédiation Terminée !" : "Fin du Quiz"}</h2>
                                    <p class="text-slate-500 text-sm mt-1">{selectedChapter.title}</p>
                                </div>

                                <div class="bg-slate-50 border border-slate-150 rounded-2xl p-6 text-center mb-8">
                                    <p class="text-sm font-bold text-slate-500 uppercase tracking-widest">Score de session</p>
                                    <h3 class="text-5xl font-extrabold text-slate-900 mt-2 mb-1">{score} / {selectedChapter.questions.length}</h3>
                                    {timeLeft === 0 && <p class="text-xs text-rose-600 font-bold mt-2">Le chrono a expiré avant que vous ne terminiez le questionnaire.</p>}
                                </div>

                                <div class="space-y-4 mb-8 max-h-[250px] overflow-y-auto pr-2">
                                    <h4 class="font-bold text-sm text-slate-900 border-b border-slate-100 pb-2">Détails de vos réponses :</h4>
                                    {userAnswers.map((ans, idx) => (
                                        <div key={idx} class="p-4 border border-slate-100 rounded-xl text-xs space-y-1.5 leading-relaxed bg-slate-50">
                                            <p class="font-bold text-slate-800">Q{idx + 1}: {ans.question}</p>
                                            <div class="flex items-center space-x-2">
                                                <span class="font-semibold text-slate-500">Votre réponse :</span>
                                                <span class={ans.isCorrect ? "text-emerald-600 font-bold" : "text-rose-600 font-bold"}>{ans.selectedOptionText}</span>
                                            </div>
                                            {!ans.isCorrect && (
                                                <div class="flex items-center space-x-2">
                                                    <span class="font-semibold text-slate-500">La bonne réponse :</span>
                                                    <span class="text-emerald-600 font-bold">{ans.correctOptionText}</span>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div class="flex space-x-4">
                                    <button onClick={() => { selectedChapter.id === "bac_blanc" ? handleStartBacBlanc() : handleStartQuiz(selectedChapter) }} class="flex-1 border border-slate-200 hover:border-slate-300 font-bold py-4 px-6 rounded-2xl transition text-slate-700 text-sm">Recommencer</button>
                                    <button onClick={() => setView('dashboard')} class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl transition shadow-md shadow-blue-100 text-sm">Retour à l'accueil</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Pied de page */}
                    <footer class="bg-white border-t border-slate-100 py-6 text-center text-xs text-slate-400 font-medium">
                        <div class="max-w-5xl mx-auto px-4">
                            <p>© 2026 SES Terminale Bac - Plateforme Éducative</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
